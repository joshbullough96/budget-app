name: Release Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to publish, for example v1.0.1. Leave blank to build artifacts only.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        shell: cmd
        run: npm run build:win -- --config.npmRebuild=false --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

  build-mac:
    name: Build Mac DMG
    runs-on: macos-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Mac disk image
        run: npx electron-builder --mac dmg --config.npmRebuild=false --publish never

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-mac
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
        run: |
          gh release view "$TAG_NAME" >/dev/null 2>&1 || gh release create "$TAG_NAME" --title "$TAG_NAME" --notes "Release $TAG_NAME"
          gh release upload "$TAG_NAME" release-artifacts/* --clobber
